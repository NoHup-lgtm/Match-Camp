app = "matchcamp-api"
primary_region = "gru"

[build]

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[env]
  HTTP_ADDR                 = ":8080"
  SESSION_COOKIE_SECURE     = "true"
  SESSION_COOKIE_SAME_SITE  = "none"
  STORAGE_DRIVER            = "r2"
